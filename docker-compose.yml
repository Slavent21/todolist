version: "3.9"

services:
  db:
    image: postgres:16
    container_name: todolist-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: a1
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todolist
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todolist-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://a1:postgres@db:5432/todolist?schema=public
      NODE_ENV: production
    depends_on:
      - db
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: todolist-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data: